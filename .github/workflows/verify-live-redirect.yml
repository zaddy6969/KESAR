name: Verify live www redirect

on:
  push:
    branches:
      - fix/audit-six-safe-items-20260724
    paths:
      - .github/workflows/verify-live-redirect.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/audit-six-safe-items-20260724
          fetch-depth: 0
      - name: Capture raw production headers
        shell: bash
        run: |
          mkdir -p verification
          {
            echo '=== WWW ROOT ==='
            curl -sS -D - -o /dev/null --max-redirs 0 https://www.hotelkesar.com/ || true
            echo
            echo '=== WWW PATH ==='
            curl -sS -D - -o /dev/null --max-redirs 0 https://www.hotelkesar.com/menu-check || true
            echo
            echo '=== APEX ROOT ==='
            curl -sS -D - -o /dev/null --max-redirs 0 https://hotelkesar.com/ || true
            echo
            echo '=== ANALYTICS ==='
            curl -sS -D - -o /dev/null --max-redirs 0 https://hotelkesar.com/_vercel/insights/script.js || true
            echo
            echo '=== CSS ==='
            curl -sS -D - -o /dev/null --max-redirs 0 https://hotelkesar.com/styles.css || true
            echo
            echo '=== ASSET ==='
            curl -sS -D - -o /dev/null --max-redirs 0 https://hotelkesar.com/assets/images/mandicombo-5-6ppl.png || true
          } > verification/live-header-check.txt
      - name: Commit report and remove one-time workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/verify-live-redirect.yml
          git add verification/live-header-check.txt
          git commit -m "Record live redirect and cache verification"
          git push origin HEAD:fix/audit-six-safe-items-20260724
