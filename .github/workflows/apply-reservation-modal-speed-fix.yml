name: Apply reservation modal speed fix

on:
  push:
    branches:
      - fix/reservation-modal-speed-20260724
    paths:
      - .github/workflows/apply-reservation-modal-speed-fix.yml

permissions:
  contents: write

jobs:
  apply-speed-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out controlled branch
        uses: actions/checkout@v4
        with:
          ref: fix/reservation-modal-speed-20260724
          fetch-depth: 0

      - name: Apply only reservation popup performance changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          version = "20260724-fast-open"
          index_path = Path("index.html")
          css_path = Path("reservation-modal.css")
          core_path = Path("reservation-modal-core.js")
          wrapper_path = Path("reservation-modal.js")

          index = index_path.read_text(encoding="utf-8")
          css = css_path.read_text(encoding="utf-8")
          core = core_path.read_text(encoding="utf-8")
          wrapper = wrapper_path.read_text(encoding="utf-8")

          old_css_link = '<link rel="stylesheet" href="reservation-modal.css" data-kesar-reservation-modal>'
          new_css_links = (
              f'<link rel="preload" href="/reservation-modal-core.js?v={version}" as="script">\n'
              f'  <link rel="stylesheet" href="/reservation-modal-reference-base.css?v={version}">\n'
              f'  <link rel="stylesheet" href="/reservation-modal.css?v={version}" data-kesar-reservation-modal>'
          )
          if old_css_link not in index:
              raise SystemExit("Reservation stylesheet marker not found")
          index = index.replace(old_css_link, new_css_links, 1)

          old_script = '<script src="reservation-modal.js"></script>'
          new_script = f'<script src="reservation-modal.js?v={version}"></script>'
          if old_script not in index:
              raise SystemExit("Reservation script marker not found")
          index = index.replace(old_script, new_script, 1)

          import_line = '@import url("/reservation-modal-reference-base.css?v=final-compact-20260723");\n\n'
          if not css.startswith(import_line):
              raise SystemExit("Expected reservation CSS import not found")
          css = css[len(import_line):]

          old_motion = '''/* Reliable opening motion: keyframes start whenever the dialog receives the open attribute. */
          .reservation-dialog[open]{animation:kesarReservationBackdropIn .34s ease both!important}
          .reservation-dialog[open] .reservation-dialog__panel{animation:kesarReservationPanelIn .52s cubic-bezier(.18,.78,.2,1) both!important;will-change:transform,opacity,filter,clip-path}
          .reservation-dialog[open] .reservation-dialog__intro-content{animation:kesarReservationContentIn .42s ease .12s both!important}
          .reservation-dialog[open] .reservation-dialog__form-host{animation:kesarReservationContentIn .42s ease .18s both!important}
          @keyframes kesarReservationBackdropIn{from{opacity:0}to{opacity:1}}
          @keyframes kesarReservationPanelIn{0%{opacity:0;transform:translateY(34px) scale(.96);filter:blur(8px);clip-path:inset(4% 3% 4% 3% round 20px)}60%{opacity:1;filter:blur(0)}100%{opacity:1;transform:translateY(0) scale(1);filter:none;clip-path:inset(0 round 16px)}}
          @keyframes kesarReservationContentIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
          '''
          old_motion = "\n".join(line.strip() for line in old_motion.strip().splitlines()) + "\n"
          if old_motion not in css:
              raise SystemExit("Existing slow reservation motion block not found")

          new_motion = '''/* Fast, smooth reservation motion: transform and opacity only. */
          .reservation-dialog{opacity:0!important;transition:opacity .16s ease-out!important}
          .reservation-dialog::backdrop{background:rgba(7,5,4,.8)!important;backdrop-filter:blur(3px)!important;-webkit-backdrop-filter:blur(3px)!important}
          .reservation-dialog__panel{opacity:0!important;transform:translate3d(0,16px,0) scale(.985)!important;transition:opacity .14s ease-out,transform .2s cubic-bezier(.16,1,.3,1)!important;will-change:transform,opacity;backface-visibility:hidden;contain:paint}
          .reservation-dialog.is-open{opacity:1!important}
          .reservation-dialog.is-open .reservation-dialog__panel{opacity:1!important;transform:translate3d(0,0,0) scale(1)!important}
          .reservation-dialog[open],.reservation-dialog[open] .reservation-dialog__panel,.reservation-dialog[open] .reservation-dialog__intro-content,.reservation-dialog[open] .reservation-dialog__form-host{animation:none!important;filter:none!important;clip-path:none!important}
          @media(max-width:700px){.reservation-dialog::backdrop{backdrop-filter:none!important;-webkit-backdrop-filter:none!important}.reservation-dialog__panel{transform:translate3d(0,12px,0) scale(.99)!important}.reservation-dialog.is-open .reservation-dialog__panel{transform:translate3d(0,0,0) scale(1)!important}}
          '''
          new_motion = "\n".join(line.strip() for line in new_motion.strip().splitlines()) + "\n"
          css = css.replace(old_motion, new_motion, 1)

          old_core_src = 'const CORE_SRC = "/reservation-modal-core.js?v=20260724-email-confirmation";'
          new_core_src = f'const CORE_SRC = "/reservation-modal-core.js?v={version}";'
          if old_core_src not in wrapper:
              raise SystemExit("Reservation core source marker not found")
          wrapper = wrapper.replace(old_core_src, new_core_src, 1)

          old_loader = '''  const core = document.createElement("script");
            core.src = CORE_SRC;
            core.async = false;
            core.onload = installSendPatch;'''
          old_loader = "\n".join(line.strip() for line in old_loader.strip().splitlines())
          new_loader = '''  const core = document.createElement("script");
            core.src = CORE_SRC;
            core.async = true;
            core.fetchPriority = "high";
            core.onload = installSendPatch;'''
          new_loader = "\n".join(line.strip() for line in new_loader.strip().splitlines())
          normalized_wrapper = "\n".join(line.rstrip() for line in wrapper.splitlines())
          if old_loader not in normalized_wrapper:
              # Fall back to exact source indentation.
              exact_old = '  const core = document.createElement("script");\n  core.src = CORE_SRC;\n  core.async = false;\n  core.onload = installSendPatch;'
              exact_new = '  const core = document.createElement("script");\n  core.src = CORE_SRC;\n  core.async = true;\n  core.fetchPriority = "high";\n  core.onload = installSendPatch;'
              if exact_old not in wrapper:
                  raise SystemExit("Reservation core loader marker not found")
              wrapper = wrapper.replace(exact_old, exact_new, 1)
          else:
              wrapper = normalized_wrapper.replace(old_loader, new_loader, 1) + "\n"

          if 'setTimeout(() => $("#name", form)?.focus({ preventScroll: true }), 90);' not in core:
              raise SystemExit("Reservation focus timing marker not found")
          core = core.replace(
              'setTimeout(() => $("#name", form)?.focus({ preventScroll: true }), 90);',
              'setTimeout(() => $("#name", form)?.focus({ preventScroll: true }), 35);',
              1
          )
          if '    }, 180);' not in core:
              raise SystemExit("Reservation close timing marker not found")
          core = core.replace('    }, 180);', '    }, 170);', 1)

          index_path.write_text(index, encoding="utf-8")
          css_path.write_text(css, encoding="utf-8")
          core_path.write_text(core, encoding="utf-8")
          wrapper_path.write_text(wrapper, encoding="utf-8")

          # Scope and outcome validation.
          assert f'/reservation-modal-core.js?v={version}' in index
          assert f'/reservation-modal-reference-base.css?v={version}' in index
          assert f'/reservation-modal.css?v={version}' in index
          assert f'reservation-modal.js?v={version}' in index
          assert '@import' not in css
          assert 'filter:blur(8px)' not in css
          assert 'clip-path:inset(4%' not in css
          assert 'transition:opacity .14s ease-out,transform .2s' in css
          assert 'backdrop-filter:none!important' in css
          assert new_core_src in wrapper
          assert 'core.fetchPriority = "high";' in wrapper
          assert 'preventScroll: true }), 35);' in core
          print("Reservation popup speed fix applied and validated.")
          PY

      - name: Commit validated popup fix and remove one-time workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-reservation-modal-speed-fix.yml
          git add index.html reservation-modal.css reservation-modal-core.js reservation-modal.js
          git commit -m "Make reservation popup open faster and smoothly"
          git push origin HEAD:fix/reservation-modal-speed-20260724
