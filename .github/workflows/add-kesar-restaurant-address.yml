name: Add KESAR restaurant schema address

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/add-kesar-restaurant-address.yml

permissions:
  contents: write

jobs:
  update-address:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add and validate PostalAddress
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          marker = '      "areaServed": "Bengaluru",\n'
          address = '''      "address": {
                "@type": "PostalAddress",
                "streetAddress": "117, Rajagopalanagar Main Road, 2nd Stage, Peenya",
                "addressLocality": "Bengaluru",
                "addressRegion": "Karnataka",
                "postalCode": "560058",
                "addressCountry": "IN"
              },
'''

          if '"streetAddress": "117, Rajagopalanagar Main Road, 2nd Stage, Peenya"' not in text:
              if marker not in text:
                  raise SystemExit("Restaurant schema areaServed marker was not found")
              text = text.replace(marker, address + marker, 1)
              path.write_text(text, encoding="utf-8")

          match = re.search(
              r'<script id="kesarRestaurantSchema" type="application/ld\+json">\s*(\{.*?\})\s*</script>',
              path.read_text(encoding="utf-8"),
              re.S,
          )
          if not match:
              raise SystemExit("Restaurant JSON-LD block was not found")

          data = json.loads(match.group(1))
          expected = {
              "@type": "PostalAddress",
              "streetAddress": "117, Rajagopalanagar Main Road, 2nd Stage, Peenya",
              "addressLocality": "Bengaluru",
              "addressRegion": "Karnataka",
              "postalCode": "560058",
              "addressCountry": "IN",
          }
          if data.get("address") != expected:
              raise SystemExit("Restaurant PostalAddress validation failed")
          print("Restaurant PostalAddress added and JSON-LD validated.")
          PY

      - name: Commit schema update
        shell: bash
        run: |
          if git diff --quiet -- index.html; then
            echo "Address is already present."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add full restaurant postal address to schema"
          git push origin HEAD:main

# Triggered after workflow installation.
